<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Background circle with gradient -->
    <defs>
        <linearGradient id="fiatGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <circle cx="24" cy="24" r="23" fill="url(#fiatGradient)"/>
    
    <!-- Abstract currency representation - interconnected circles -->
    <g opacity="0.9">
        <!-- Central circle -->
        <circle cx="24" cy="24" r="8" fill="none" stroke="white" stroke-width="2" opacity="0.8"/>
        
        <!-- Orbital circles representing different currencies -->
        <circle cx="24" cy="14" r="4" fill="white" opacity="0.7"/>
        <circle cx="34" cy="24" r="4" fill="white" opacity="0.7"/>
        <circle cx="24" cy="34" r="4" fill="white" opacity="0.7"/>
        <circle cx="14" cy="24" r="4" fill="white" opacity="0.7"/>
        
        <!-- Connecting lines -->
        <line x1="24" y1="16" x2="24" y2="32" stroke="white" stroke-width="1.5" opacity="0.5"/>
        <line x1="16" y1="24" x2="32" y2="24" stroke="white" stroke-width="1.5" opacity="0.5"/>
        <line x1="18" y1="18" x2="30" y2="30" stroke="white" stroke-width="1.5" opacity="0.5"/>
        <line x1="30" y1="18" x2="18" y2="30" stroke="white" stroke-width="1.5" opacity="0.5"/>
    </g>
</svg>